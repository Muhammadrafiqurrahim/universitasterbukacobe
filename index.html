<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Kampus</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<!-- SWIPER -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <div class="logo-container">
        <img src="logo.png" class="logo-img">
        <span class="logo-text">Universitas Terbuka</span>
    </div>

    <nav class="navbar">
        <a href="#">Beranda</a>
        <a href="index2.html">Pendaftaran</a>
    </nav>

</header>

<!-- HOME -->
<section class="home">

    <!-- KIRI -->
    <div class="home-content">
        <h3>Selamat Datang di</h3>
        <h1>Universitas Terbuka</h1>
        <p>Kampus unggulan berbasis teknologi dan inovasi.</p>

        <a href="index2.html" class="btn">Daftar Sekarang</a>
    </div>

    <!-- KANAN (SLIDER) -->
    <div class="home-img">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <img src="img/brosur.jpeg">
                </div>

                <div class="swiper-slide">
                    <img src="logo.png">
                </div>

                <div class="swiper-slide">
                    <img src="img/brosur.jpeg">
                </div>

            </div>

            <!-- NAV -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

</section>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="main.js"></script>

</body>
</html>
